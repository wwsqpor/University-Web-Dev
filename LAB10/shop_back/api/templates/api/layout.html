{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Shop{% endblock %}</title>
    {% block cssStyles %}{% endblock %}
    <link rel="stylesheet" href="{% static 'api/css/layout.css' %}">
</head>
<body>
<body>
    <div class="main-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="sticky-nav">
        <a href="{% url 'product_list' %}" class="nav-btn primary">Product List</a>
        <a href="{% url 'categories_list' %}" class="nav-btn secondary">Category List</a>
    </footer>
</body>
</body>
</html>
