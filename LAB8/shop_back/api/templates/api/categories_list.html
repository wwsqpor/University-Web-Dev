{% extends 'api/layout.html' %}
{% load static %}

{% block title %}Categories List{% endblock %}

{% block cssStyles %}
    <link rel="stylesheet" href="{% static 'api/css/categories_list.css' %}">
{% endblock %}

{% block content %}
    <nav class="category-container">
        {% for category in categories %}
            <a href="{% url 'category' category.pk %}"  class="category-item">
                {{ category.name }}
            </a>
        {% endfor %}
    </nav>
{% endblock %}
